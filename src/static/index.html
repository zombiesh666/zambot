<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 👉 Updated Browser/Tab Title -->
    <title>Zambot - ATX Ice Schedule • Your Shift Starts Here</title>
    <!-- Modern Inline SVG Favicon (Hockey Skate) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛸️</text></svg>">
    <!-- Import Retro Scoreboard Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #111111;
            --bg-row-alt: rgba(255, 255, 255, 0.02);
            --bg-row-hover: rgba(255, 255, 255, 0.06);
            --border: #333333;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Chakra Petch', sans-serif;
            padding-bottom: 3rem;
            -webkit-font-smoothing: antialiased;
        }

        header { padding: 2rem 1rem 1rem; max-width: 1200px; margin: 0 auto; }
        .branding { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; }
        .branding h1 { font-size: 2.25rem; font-weight: 700; letter-spacing: 0.05em; margin: 0; text-transform: uppercase; color: var(--text-main); }
        .branding .motto { font-size: 1rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.3rem; }

        main { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }

        /* Accordion Structural Wrapper */
        .date-accordion-block { margin-bottom: 0.75rem; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }

        /* Header Bar Trigger */
        .date-accordion-trigger {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: none;
            color: var(--text-main);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            padding: 1rem 1.25rem;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.15s;
        }
        .date-accordion-trigger:hover { background: rgba(255,255,255,0.06); }

        /* Dynamic Indicator Arrow Icon */
        .accordion-arrow { font-size: 0.85rem; color: var(--text-muted); transition: transform 0.2s ease; }
        .date-accordion-block.open .accordion-arrow { transform: rotate(180deg); }

        /* Hidden/Revealed Slide Container */
        .date-accordion-content { display: none; background: #0c0c0c; border-top: 1px solid rgba(255,255,255,0.03); }
        .date-accordion-block.open .date-accordion-content { display: block; }

        /* Dashboard Table Styling */
        .table-wrapper { width: 100%; }
        .zambot-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 1rem; white-space: nowrap; }

        .zambot-table tbody tr { cursor: pointer; transition: background-color 0.15s ease; }
        .zambot-table td { padding: 1.15rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }

        .zambot-table tbody tr:nth-child(even) { background-color: var(--bg-row-alt); }
        .zambot-table tbody tr:hover { background-color: var(--bg-row-hover); }

        .col-type { font-weight: 500; color: var(--text-main); font-size: 1.1rem; }
        .type-icon { display: inline-block; margin-right: 6px; font-size: 1.2em; }

        .col-rink { color: var(--text-muted); }
        .col-time { font-weight: 600; letter-spacing: 0.05em; }

        /* Resource Badges */
        .badge { font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.1em; display: inline-block; }
        .badge-gold { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-silver { background: rgba(148, 163, 184, 0.1); color: var(--text-main); border: 1px solid rgba(148, 163, 184, 0.2); }
        .badge-chaparral { background: rgba(37, 99, 235, 0.1); color: #60a5fa; border: 1px solid rgba(37, 99, 235, 0.2); }
        .badge-barn { background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.2); }
        .badge-pond-rink { background: rgba(185, 28, 28, 0.1); color: #f87171; border: 1px solid rgba(185, 28, 28, 0.2); }

        /* Capacity & Status */
        .cap-line { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .cap-line span { color: var(--text-main); font-weight: 600; font-size: 1rem; }

        .status-pill { padding: 0.35rem 0.75rem; font-size: 0.8rem; font-weight: 700; border-radius: 4px; border: 1px solid transparent; text-transform: uppercase; letter-spacing: 0.1em; display: inline-block; text-align: center; min-width: 90px; }
        .status-open { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .status-full { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border-color: rgba(244, 63, 94, 0.3); }
        .status-progress { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-color: rgba(56, 189, 248, 0.3); }

        .state-msg { text-align: center; padding: 5rem 1rem; color: var(--text-muted); font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .spinner { width: 2rem; height: 2rem; border: 3px solid var(--border); border-top-color: var(--text-main); border-radius: 50%; margin: 0 auto 1rem; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .branding { flex-direction: column; align-items: center; gap: 0.5rem; border-bottom: none; }
            .branding h1 { font-size: 2rem; text-align: center; margin: 0; }
            .branding .motto { font-size: 0.85rem; text-align: center; margin-bottom: 1rem; }

            .zambot-table, .zambot-table tbody { display: block; width: 100%; }
            .zambot-table tbody tr {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-gap: 0.75rem;
                padding: 1.25rem 1rem;
                border-bottom: 1px solid var(--border);
                background-color: transparent;
            }
            .zambot-table tbody tr:last-child { border-bottom: none; }

            /* Apply alt row color */
            .zambot-table tbody tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.01); }

            /* FORCE hover state to apply and override the nth-child on mobile */
            .zambot-table tbody tr:hover,
            .zambot-table tbody tr:nth-child(even):hover {
                background-color: var(--bg-row-hover);
            }

            .zambot-table td { padding: 0; border: none; display: flex; align-items: center; white-space: normal; background-color: transparent !important; }

            .zambot-table td.col-type { grid-column: 1 / 2; grid-row: 1; font-size: 1.2rem; }
            .zambot-table td.col-status { grid-column: 2 / 3; grid-row: 1; justify-content: flex-end; }

            .zambot-table td.col-rink { grid-column: 1 / 3; grid-row: 2; font-size: 1rem; }
            .zambot-table td.col-resource { grid-column: 1 / 3; grid-row: 3; }

            .zambot-table td.col-time { grid-column: 1 / 3; grid-row: 4; font-size: 1.1rem; color: var(--text-main); margin-top: 0.5rem; }

            .zambot-table td.col-capacity { grid-column: 1 / 3; grid-row: 5; flex-direction: column; align-items: flex-start; margin-top: 0.5rem; border-top: 1px solid var(--border); padding-top: 0.75rem; }

            .cap-line { width: 100%; display: flex; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <header>
        <div class="branding">
            <h1>ZAMBOT</h1>
            <span class="motto">ATX Ice Schedule • Your Shift Starts Here</span>
        </div>
    </header>

    <main>
        <section id="scheduleView"></section>
    </main>

    <script>
        let rawSessions = [];

        async function fetchSessions() {
            const container = document.getElementById('scheduleView');
            container.innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading Data Feed...</div>';
            try {
                const res = await fetch('/sessions');
                if (!res.ok) throw new Error('Data drop offline');
                rawSessions = await res.json();
                renderAgenda();
            } catch (err) {
                container.innerHTML = `<div class="state-msg">❌ Error loading records: ${err.message}</div>`;
            }
        }

        function toggleAccordion(elementId) {
            const container = document.getElementById(elementId);
            if (container) {
                container.classList.toggle('open');
            }
        }

        function formatType(rawType, summaryName) {
            if (rawType === 'dropin') return 'Drop-In';
            if (rawType === 'stickandpuck') return 'Stick & Puck';
            if (rawType === 'public') return 'Public Skate';
            const lowerName = summaryName.toLowerCase();
            if (lowerName.includes('stick') || lowerName.includes('puck') || lowerName.includes('bt') || lowerName.includes('pt')) return 'Stick & Puck';
            if (lowerName.includes('drop')) return 'Drop-In';
            return 'Recreational';
        }

        function formatRink(facility, resource) {
            const fName = (facility || '').toLowerCase();
            if (fName.includes('chaparral')) return 'Chaparral';
            if (fName.includes('pond')) return 'Pond';
            return 'Crossover';
        }

        function renderAgenda() {
            const container = document.getElementById('scheduleView');
            const now = new Date();

            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            const tomorrowObj = new Date();
            tomorrowObj.setDate(now.getDate() + 1);
            const tomorrowStr = `${tomorrowObj.getFullYear()}-${String(tomorrowObj.getMonth() + 1).padStart(2, '0')}-${String(tomorrowObj.getDate()).padStart(2, '0')}`;

            const filtered = rawSessions.filter(s => {
                const eventDate = s.start_time ? s.start_time.split('T')[0] : '';
                if (eventDate < todayStr) return false;

                const nowTime = new Date().getTime();
                const endTime = s.end_time ? new Date(s.end_time).getTime() : 0;
                const feedStatus = s.registration_status ? s.registration_status.toLowerCase() : '';

                const skaterOpen = s.skaters_open_slots !== undefined ? s.skaters_open_slots : 0;
                const skaterCap = s.skaters_capacity !== undefined ? s.skaters_capacity : 0;
                const goalieOpen = s.goalies_open_slots !== undefined ? s.goalies_open_slots : 0;
                const goalieCap = s.goalies_capacity !== undefined ? s.goalies_capacity : 0;

                const isSkatersFull = skaterCap > 0 && skaterOpen <= 0;
                const isGoaliesFull = goalieCap > 0 && goalieOpen <= 0;

                let isSpotsFull = false;
                if (skaterCap > 0 && goalieCap > 0) {
                    isSpotsFull = isSkatersFull && isGoaliesFull;
                } else if (skaterCap > 0) {
                    isSpotsFull = isSkatersFull;
                } else if (goalieCap > 0) {
                    isSpotsFull = isGoaliesFull;
                }

                const isEndTimePassed = endTime > 0 && nowTime > endTime;
                const isClosedFeed = feedStatus === 'closed';

                if (isEndTimePassed || (isClosedFeed && !isSpotsFull)) {
                    return false;
                }

                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="state-msg">📭 No upcoming hockey sessions found.</div>';
                return;
            }

            const groups = {};
            filtered.forEach(s => {
                const dateKey = s.start_time ? s.start_time.split('T')[0] : 'Unknown Date';
                if (!groups[dateKey]) groups[dateKey] = [];
                groups[dateKey].push(s);
            });

            let htmlString = '';
            let uniqueIdIndex = 0;

            Object.keys(groups).sort().forEach(date => {
                uniqueIdIndex++;
                const blockId = `accordion-block-${uniqueIdIndex}`;

                let displayHeader = date;
                let isAutoOpen = false;
                let dateBadgeStr = '';

                if (date !== 'Unknown Date') {
                    const parts = date.split('-');
                    const dateObj = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
                    displayHeader = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', timeZone: 'UTC' });

                    dateBadgeStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' }) + ', ';

                    if (date === todayStr) {
                        displayHeader = 'Today';
                        isAutoOpen = true;
                    } else if (date === tomorrowStr) {
                        displayHeader = 'Tomorrow';
                    }
                }

                htmlString += `
                    <div class="date-accordion-block ${isAutoOpen ? 'open' : ''}" id="${blockId}">
                        <button class="date-accordion-trigger" onclick="toggleAccordion('${blockId}')">
                            <span>${displayHeader}</span>
                            <span class="accordion-arrow">▼</span>
                        </button>
                        <div class="date-accordion-content">
                            <div class="table-wrapper">
                                <table class="zambot-table">
                                    <tbody>
                `;

                groups[date].forEach(s => {
                    const typeDisplay = formatType(s.event_type, s.summary_name);
                    const rinkDisplay = formatRink(s.facility_name, s.resource_name);
                    let rName = s.resource_name || 'Unknown Rink';

                    let typeIcon = '📅';
                    if (typeDisplay === 'Drop-In') typeIcon = '🚨';
                    else if (typeDisplay === 'Stick & Puck') typeIcon = '🏒';
                    else if (typeDisplay === 'Public Skate') typeIcon = '⛸️';

                    let badgeClass = 'badge-silver';
                    if (rinkDisplay === 'Chaparral') {
                        badgeClass = 'badge-chaparral';
                    } else if (rinkDisplay === 'Pond') {
                        if (rName.toLowerCase().includes('barn')) {
                            badgeClass = 'badge-barn';
                            rName = 'Barn side';
                        } else {
                            badgeClass = 'badge-pond-rink';
                            rName = 'Pond side';
                        }
                    } else if (rName.includes('Gold')) {
                        badgeClass = 'badge-gold';
                    }

                    const skaterOpen = s.skaters_open_slots !== undefined ? s.skaters_open_slots : 0;
                    const skaterCap = s.skaters_capacity !== undefined ? s.skaters_capacity : 0;
                    const goalieOpen = s.goalies_open_slots !== undefined ? s.goalies_open_slots : 0;
                    const goalieCap = s.goalies_capacity !== undefined ? s.goalies_capacity : 0;

                    const skaterText = skaterOpen === 1 ? '1 Spot Left' : `${skaterOpen} Spots Left`;
                    const goalieText = goalieOpen === 1 ? '1 Spot Left' : `${goalieOpen} Spots Left`;

                    let capacityHTML = `<div class="cap-line">Skaters: <span>${skaterCap > 0 ? skaterText : 'N/A'}</span></div>`;
                    if (goalieCap > 0) {
                        capacityHTML += `<div class="cap-line">Goalies: <span>${goalieText}</span></div>`;
                    }

                    const nowTime = new Date().getTime();
                    const startTime = s.start_time ? new Date(s.start_time).getTime() : 0;
                    const endTime = s.end_time ? new Date(s.end_time).getTime() : 0;

                    const feedStatus = s.registration_status ? s.registration_status.toLowerCase() : '';
                    const isFullFeed = feedStatus === 'full';

                    const isSkatersFull = skaterCap > 0 && skaterOpen <= 0;
                    const isGoaliesFull = goalieCap > 0 && goalieOpen <= 0;

                    let isSpotsFull = false;
                    if (skaterCap > 0 && goalieCap > 0) {
                        isSpotsFull = isSkatersFull && isGoaliesFull;
                    } else if (skaterCap > 0) {
                        isSpotsFull = isSkatersFull;
                    } else if (goalieCap > 0) {
                        isSpotsFull = isGoaliesFull;
                    }

                    const isFull = isSpotsFull || isFullFeed;
                    const isInProgress = !isFull && startTime > 0 && endTime > 0 && nowTime >= startTime && nowTime <= endTime;
                    const isOpen = (!isInProgress && !isFull) || (feedStatus === 'open');

                    let statusClass = 'status-unknown';
                    let statusText = 'Unknown';

                    if (isFull) {
                        statusText = 'Full'; statusClass = 'full';
                    } else if (isInProgress) {
                        statusText = 'Live'; statusClass = 'progress';
                    } else if (isOpen) {
                        statusText = 'Open'; statusClass = 'open';
                    }

                    const timeBlock = `${dateBadgeStr}${formatTimeStr(s.start_time)} - ${formatTimeStr(s.end_time)}`;
                    const clickAction = s.event_url ? `onclick="window.open('${s.event_url}', '_blank')"` : '';

                    htmlString += `
                        <tr ${clickAction}>
                            <td class="col-type">
                                <span class="type-icon">${typeIcon}</span>
                                ${typeDisplay}
                            </td>
                            <td class="col-rink">${rinkDisplay}</td>
                            <td class="col-resource"><span class="badge ${badgeClass}">${rName}</span></td>
                            <td class="col-time">${timeBlock}</td>
                            <td class="col-capacity">${capacityHTML}</td>
                            <td class="col-status">
                                <span class="status-pill status-${statusClass}">${statusText}</span>
                            </td>
                        </tr>
                    `;
                });

                htmlString += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlString;
        }

        function formatTimeStr(isoString) {
            if (!isoString) return 'N/A';
            const timePart = isoString.includes('T') ? isoString.split('T')[1] : isoString;
            const [hours, minutes] = timePart.split(':');
            const hr = parseInt(hours, 10);
            const ampm = hr >= 12 ? 'PM' : 'AM';
            const displayHr = hr % 12 || 12;
            return `${displayHr}:${minutes} ${ampm}`;
        }

        window.addEventListener('DOMContentLoaded', fetchSessions);
    </script>
</body>
</html>
