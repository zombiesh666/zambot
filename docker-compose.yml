services:
  zambot-app:
    build: .
    container_name: zambot-app
    expose:
      - "8000"
    volumes:
      - ~/zambot/data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: zambot-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ~/zambot/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - zambot-app

  goaccess:
    # 👉 FIX: Switched to the open linuxserver build to clear the pull error
    image: lscr.io/linuxserver/goaccess:latest
    container_name: zambot-analytics
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - caddy_logs:/cxlogs:ro
      - ~/zambot/data:/config
    # Linuxserver uses a built-in UI daemon, or we can force the standard direct compile flag:
    command: goaccess /cxlogs/access.log -o /config/stats.html --real-time-html --log-format=CADDY

volumes:
  caddy_data:
  caddy_config:
  caddy_logs: