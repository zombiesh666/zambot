services:
  zambot-app:
    build: .
    container_name: zambot-app
    expose:
      - "8000"
    volumes:
      - ~/zambot/data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: zambot-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ~/zambot/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - zambot-app

volumes:
  caddy_data:
  caddy_config: