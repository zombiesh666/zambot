version: '3.8'

services:
  zambot-app:
    build: .
    container_name: zambot-app
    ports:
      # 👉 Maps standard HTTP port 80 on your droplet host to 8000 inside the container
      - "80:8000"
    volumes:
      - ~/zambot/data:/app/data
      # FIX: Sync the droplet host system clock and timezone parameters directly into the container environment
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: always