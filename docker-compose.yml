version: '3.8'

services:
  zambot-app:
    build: .
    container_name: zambot-app
    expose:
      - "8000"
    volumes:
      - ~/zambot/data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: zambot-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ~/zambot/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # Shared log volume for GoAccess to read
      - caddy_logs:/var/log/caddy
    depends_on:
      - zambot-app

  goaccess:
    image: allinone/goaccess
    container_name: zambot-analytics
    restart: always
    environment:
      - GOACCESS_CUSTOM_COMMAND=--log-format=CADDY
    volumes:
      - caddy_logs:/srv/logs:ro
      # Outputs a beautiful static report file right into your data directory
      - ~/zambot/data:/srv/report
    command: goaccess /srv/logs/access.log -o /srv/report/stats.html --real-time-html --log-format=CADDY

volumes:
  caddy_data:
  caddy_config:
  caddy_logs: