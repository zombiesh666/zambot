version: '3.8'

services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./src:/app/src

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # 👉 Share logs directory with the host
      - ./logs:/var/log/caddy

  goaccess:
    image: allinurl/goaccess
    restart: unless-stopped
    volumes:
      - ./logs:/var/log/caddy
      - ./src/static:/html
    command: >
      /var/log/caddy/access.log
      --log-format=CADDY
      -o /html/metrics.html
      --real-time-html
      --ws-url=wss://zambot.live/ws-metrics
      --port=7890

volumes:
  caddy_data:
  caddy_config: