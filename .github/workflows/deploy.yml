name: Deploy Zambot App

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to DigitalOcean Droplet via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Navigate into your production directory
          cd ~/zambot
          
          # 1. Temporarily override the remote URL to authenticate seamlessly using the pipeline token
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # 2. Fetch the absolute latest changes from GitHub
          git fetch origin
          
          # 3. Force the local files to match the main branch exactly, clearing out legacy tracking issues
          git reset --hard origin/main
          
          # 4. Force Docker Compose to build the container locally from the fresh files
          docker compose up -d --build --force-recreate
