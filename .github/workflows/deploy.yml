name: Deploy Zambot to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/zambot
            # Update code
            git pull origin main
            
            # Rebuild image
            docker build -t zambot-backend .
            
            # Stop and remove existing container if it exists
            docker stop zambot-app || true
            docker rm zambot-app || true
            
            # Run new container
            docker run -d \
              --name zambot-app \
              -p 8000:8000 \
              -v "$(pwd)/data:/app/data" \
              --restart unless-stopped \
              zambot-backend