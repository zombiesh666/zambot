name: Deploy Zambot to Production

on:
  pull_request:
    branches:
        # This ensures the deploy only happens when you merge to main
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # The port is usually 22 by default, but we'll be explicit
          port: 22
          script: |
            cd ~/zambot
            # 1. Update the code from GitHub
            git pull origin main
            
            # 2. Rebuild the Docker image with the new code
            docker build -t zambot-backend .
            
            # 3. Stop and remove the old container
            docker stop zambot-app || true
            docker rm zambot-app || true
            
            # 4. Run the new container with the data volume attached
            docker run -d \
              --name zambot-app \
              -p 8000:8000 \
              -v "$(pwd)/data:/app/data" \
              --restart unless-stopped \
              zambot-backend
