name: Deploy Zambot App

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to DigitalOcean Droplet via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Navigate into your production directory
          cd ~/zambot
          
          # 2. Fetch the latest code changes from your repository
          git fetch origin
          
          # 3. Pull down the exact branch code being evaluated in the PR
          git pull origin main
          
          # 4. Force Docker Compose to rebuild the container directly from the fresh source code
          docker compose up -d --build --force-recreate
